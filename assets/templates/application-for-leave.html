<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Application for Leave Template</title>
  <style>
    :root {
      --ink: #1d2c4d;
      --muted: #61708b;
      --line: #cfd8e6;
      --panel: #f5f8fd;
      --accent: #254a8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef3fb 0%, #ffffff 100%);
    }
    .shell { max-width: 980px; margin: 0 auto; padding: 32px 20px 64px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 16px 18px;
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 18px;
    }
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .page {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(37, 74, 138, 0.08);
    }
    h1, p { margin: 0; }
    .heading { text-align: center; margin-bottom: 28px; }
    .heading p { color: var(--muted); margin-top: 8px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      background: var(--panel);
    }
    textarea { min-height: 96px; resize: vertical; }
    .signature {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      margin-top: 42px;
    }
    .signature-line { border-top: 1px solid var(--ink); padding-top: 8px; font-size: 13px; }
    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .shell { padding: 0; }
      .page { border: none; box-shadow: none; border-radius: 0; }
    }
    @media (max-width: 720px) {
      .page { padding: 22px; }
      .grid, .signature { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <p>Blank Application for Leave form. Download or print this page as needed.</p>
      <button type="button" onclick="window.print()">Print / Save PDF</button>
    </div>

    <main class="page">
      <div class="heading">
        <h1>Application for Leave</h1>
        <p>Agricultural Training Institute Human Resource Information System</p>
      </div>

      <div class="grid">
        <div>
          <label for="employee-name">Employee Name</label>
          <input id="employee-name" type="text">
        </div>
        <div>
          <label for="office">Office / Division</label>
          <input id="office" type="text">
        </div>
        <div>
          <label for="leave-type">Leave Type</label>
          <select id="leave-type">
            <option>Vacation Leave</option>
            <option>Sick Leave</option>
            <option>CTO</option>
            <option>Special Leave</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="filing-date">Date Filed</label>
          <input id="filing-date" type="date">
        </div>
        <div>
          <label for="date-from">Date From</label>
          <input id="date-from" type="date">
        </div>
        <div>
          <label for="date-to">Date To</label>
          <input id="date-to" type="date">
        </div>
      </div>

      <div>
        <label for="reason">Reason for Leave</label>
        <textarea id="reason"></textarea>
      </div>

      <div class="signature">
        <div class="signature-line">Employee Signature</div>
        <div class="signature-line">Immediate Supervisor</div>
        <div class="signature-line">HR Review / Approval</div>
      </div>
    </main>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Official Business Report Template</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14312c;
      --muted: #5b6f69;
      --line: #c8d4d1;
      --panel: #f6faf8;
      --accent: #0b7a75;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef6f2 0%, #ffffff 100%);
    }
    .shell { max-width: 980px; margin: 0 auto; padding: 32px 20px 64px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 16px 18px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      position: sticky;
      top: 12px;
    }
    .toolbar p { margin: 0; color: var(--muted); font-size: 14px; }
    .toolbar-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: var(--accent);
    }
    .page {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(20, 49, 44, 0.08);
    }
    h1, h2, p { margin: 0; }
    .heading { text-align: center; margin-bottom: 28px; }
    .heading p { color: var(--muted); margin-top: 8px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      background: var(--panel);
    }
    textarea { min-height: 96px; resize: vertical; }
    table { width: 100%; border-collapse: collapse; margin: 18px 0; }
    th, td { border: 1px solid var(--line); padding: 10px 12px; vertical-align: top; }
    th { background: var(--panel); text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
    .signature {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
      margin-top: 42px;
    }
    .signature-line { border-top: 1px solid var(--ink); padding-top: 8px; font-size: 13px; }
    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .shell { padding: 0; }
      .page { border: none; box-shadow: none; border-radius: 0; }
    }
    @media (max-width: 720px) {
      .page { padding: 22px; }
      .grid, .signature { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <p>Use this template for viewing, browser-based editing, and printing or saving to PDF.</p>
      <div class="toolbar-actions">
        <button type="button" onclick="window.print()">Print / Save PDF</button>
        <button type="button" class="secondary" onclick="document.getElementById('ob-form').reset()">Reset Form</button>
      </div>
    </div>

    <main class="page">
      <div class="heading">
        <h1>Official Business Report</h1>
        <p>Agricultural Training Institute Human Resource Information System</p>
      </div>

      <form id="ob-form">
        <div class="grid">
          <div>
            <label for="employee-name">Employee Name</label>
            <input id="employee-name" name="employee_name" type="text">
          </div>
          <div>
            <label for="office">Office / Division</label>
            <input id="office" name="office" type="text">
          </div>
          <div>
            <label for="report-date">Date</label>
            <input id="report-date" name="report_date" type="date">
          </div>
          <div>
            <label for="destination">Destination / Area Covered</label>
            <input id="destination" name="destination" type="text">
          </div>
        </div>

        <div>
          <label for="purpose">Purpose / Summary of Official Business</label>
          <textarea id="purpose" name="purpose"></textarea>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width: 18%;">Time</th>
              <th style="width: 32%;">Activity</th>
              <th style="width: 30%;">Location</th>
              <th style="width: 20%;">Remarks</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="text" name="time_1"></td>
              <td><textarea name="activity_1"></textarea></td>
              <td><input type="text" name="location_1"></td>
              <td><textarea name="remarks_1"></textarea></td>
            </tr>
            <tr>
              <td><input type="text" name="time_2"></td>
              <td><textarea name="activity_2"></textarea></td>
              <td><input type="text" name="location_2"></td>
              <td><textarea name="remarks_2"></textarea></td>
            </tr>
            <tr>
              <td><input type="text" name="time_3"></td>
              <td><textarea name="activity_3"></textarea></td>
              <td><input type="text" name="location_3"></td>
              <td><textarea name="remarks_3"></textarea></td>
            </tr>
          </tbody>
        </table>

        <div>
          <label for="certification">Certification / Results</label>
          <textarea id="certification" name="certification"></textarea>
        </div>

        <div class="signature">
          <div class="signature-line">Prepared by / Employee Signature</div>
          <div class="signature-line">Noted by / Supervisor Signature</div>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
